version: '3.8'

services:
  gateway:
    image: ghcr.io/hdfc-as03/shared-gateway:${IMAGE_TAG:-latest}
    container_name: shared-gateway
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ENV=${ENV:-production}
    networks:
      - shared-auth-network
    restart: unless-stopped

networks:
  shared-auth-network:
    name: shared-auth-network
    driver: bridge
