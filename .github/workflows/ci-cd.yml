name: CI-CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - staging
          - production
      deploy_target:
        description: "Deploy scope"
        required: true
        type: choice
        options:
          - all
          - naba
          - prasu
          - gateway

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI - ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: naba
            path: naba/AS-03-Backend
          - name: prasu
            path: prasu/AS-03-Backend
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ matrix.path }}/requirements.txt
      - run: pip install -r requirements.txt
      - run: ruff check .

  frontend-ci:
    name: Frontend CI - ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: naba
            path: naba/Frontend
          - name: prasu
            path: prasu/AS-03-Frontend
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.path }}/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  gateway-ci:
    name: Gateway CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared-infra/gateway
    steps:
      - uses: actions/checkout@v4
      - run: echo "Gateway validation passed"

  detect-changes:
    name: Detect Changed Components
    runs-on: ubuntu-latest
    outputs:
      all_images: ${{ steps.build-matrix.outputs.all_images }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: build-matrix
        run: |
          # Build full matrix if workflow_dispatch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.deploy_target }}" in
              all)
                echo "all_images=[{\"image\":\"naba-backend\",\"dockerfile\":\"naba/AS-03-Backend/Dockerfile\",\"context\":\"naba/AS-03-Backend\"},{\"image\":\"naba-frontend\",\"dockerfile\":\"naba/Frontend/Dockerfile\",\"context\":\"naba/Frontend\"},{\"image\":\"prasu-backend\",\"dockerfile\":\"prasu/AS-03-Backend/Dockerfile\",\"context\":\"prasu/AS-03-Backend\"},{\"image\":\"prasu-frontend\",\"dockerfile\":\"prasu/AS-03-Frontend/Dockerfile\",\"context\":\"prasu/AS-03-Frontend\"},{\"image\":\"shared-gateway\",\"dockerfile\":\"shared-infra/gateway/Dockerfile\",\"context\":\"shared-infra/gateway\"}]" >> "$GITHUB_OUTPUT"
                ;;
              naba)
                echo "all_images=[{\"image\":\"naba-backend\",\"dockerfile\":\"naba/AS-03-Backend/Dockerfile\",\"context\":\"naba/AS-03-Backend\"},{\"image\":\"naba-frontend\",\"dockerfile\":\"naba/Frontend/Dockerfile\",\"context\":\"naba/Frontend\"}]" >> "$GITHUB_OUTPUT"
                ;;
              prasu)
                echo "all_images=[{\"image\":\"prasu-backend\",\"dockerfile\":\"prasu/AS-03-Backend/Dockerfile\",\"context\":\"prasu/AS-03-Backend\"},{\"image\":\"prasu-frontend\",\"dockerfile\":\"prasu/AS-03-Frontend/Dockerfile\",\"context\":\"prasu/AS-03-Frontend\"}]" >> "$GITHUB_OUTPUT"
                ;;
              gateway)
                echo "all_images=[{\"image\":\"shared-gateway\",\"dockerfile\":\"shared-infra/gateway/Dockerfile\",\"context\":\"shared-infra/gateway\"}]" >> "$GITHUB_OUTPUT"
                ;;
            esac
          else
            # For push events to main/master, build all changed components
            echo "all_images=[{\"image\":\"naba-backend\",\"dockerfile\":\"naba/AS-03-Backend/Dockerfile\",\"context\":\"naba/AS-03-Backend\"},{\"image\":\"naba-frontend\",\"dockerfile\":\"naba/Frontend/Dockerfile\",\"context\":\"naba/Frontend\"},{\"image\":\"prasu-backend\",\"dockerfile\":\"prasu/AS-03-Backend/Dockerfile\",\"context\":\"prasu/AS-03-Backend\"},{\"image\":\"prasu-frontend\",\"dockerfile\":\"prasu/AS-03-Frontend/Dockerfile\",\"context\":\"prasu/AS-03-Frontend\"},{\"image\":\"shared-gateway\",\"dockerfile\":\"shared-infra/gateway/Dockerfile\",\"context\":\"shared-infra/gateway\"}]" >> "$GITHUB_OUTPUT"
          fi

  cd-build-push:
    name: Build & Push - ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
      - gateway-ci
      - detect-changes
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.all_images) }}
    steps:
      - uses: actions/checkout@v4
      - id: lowercase
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}

  deploy-naba-instance:
    name: Deploy naba → Instance 1
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
      - gateway-ci
      - cd-build-push
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'naba'))
    steps:
      - id: lowercase
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.INSTANCE1_HOST }}
          username: ${{ secrets.INSTANCE1_USER }}
          key: ${{ secrets.INSTANCE1_SSH_KEY }}
          port: ${{ secrets.INSTANCE1_PORT || '22' }}
          script_stop: true
          script: |
            export GHCR_USERNAME='${{ github.actor }}'
            export NABA_BACKEND_IMAGE='ghcr.io/${{ steps.lowercase.outputs.owner }}/naba-backend:${{ github.sha }}'
            export NABA_FRONTEND_IMAGE='ghcr.io/${{ steps.lowercase.outputs.owner }}/naba-frontend:${{ github.sha }}'
            export DEPLOY_ENV='${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}'
            
            ${{ secrets.INSTANCE1_MIGRATION_COMMAND }}
            ${{ secrets.INSTANCE1_DEPLOY_COMMAND }}
            ${{ secrets.INSTANCE1_HEALTHCHECK_COMMAND }}

  deploy-prasu-instance:
    name: Deploy prasu → Instance 2
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
      - gateway-ci
      - cd-build-push
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'prasu'))
    steps:
      - id: lowercase
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.INSTANCE2_HOST }}
          username: ${{ secrets.INSTANCE2_USER }}
          key: ${{ secrets.INSTANCE2_SSH_KEY }}
          port: ${{ secrets.INSTANCE2_PORT || '22' }}
          script_stop: true
          script: |
            export GHCR_USERNAME='${{ github.actor }}'
            export PRASU_BACKEND_IMAGE='ghcr.io/${{ steps.lowercase.outputs.owner }}/prasu-backend:${{ github.sha }}'
            export PRASU_FRONTEND_IMAGE='ghcr.io/${{ steps.lowercase.outputs.owner }}/prasu-frontend:${{ github.sha }}'
            export DEPLOY_ENV='${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}'
            
            ${{ secrets.INSTANCE2_MIGRATION_COMMAND }}
            ${{ secrets.INSTANCE2_DEPLOY_COMMAND }}
            ${{ secrets.INSTANCE2_HEALTHCHECK_COMMAND }}

  deploy-gateway-instance:
    name: Deploy gateway → Instance 3
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
      - gateway-ci
      - cd-build-push
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'gateway'))
    steps:
      - id: lowercase
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.INSTANCE3_HOST }}
          username: ${{ secrets.INSTANCE3_USER }}
          key: ${{ secrets.INSTANCE3_SSH_KEY }}
          port: ${{ secrets.INSTANCE3_PORT || '22' }}
          script_stop: true
          script: |
            export GHCR_USERNAME='${{ github.actor }}'
            export GATEWAY_IMAGE='ghcr.io/${{ steps.lowercase.outputs.owner }}/shared-gateway:${{ github.sha }}'
            export DEPLOY_ENV='${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}'
            
            ${{ secrets.INSTANCE3_DEPLOY_COMMAND }}
            ${{ secrets.INSTANCE3_HEALTHCHECK_COMMAND }}

