version: '3.8'

services:
  backend:
    image: ghcr.io/hdfc-as03/naba-backend:${IMAGE_TAG:-latest}
    container_name: naba-backend
    ports:
      - "8000:8000"
    environment:
      - KEYCLOAK_SERVER_URL=${KEYCLOAK_SERVER_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_ADMIN_CLIENT_ID=${KEYCLOAK_ADMIN_CLIENT_ID}
      - KEYCLOAK_ADMIN_CLIENT_SECRET=${KEYCLOAK_ADMIN_CLIENT_SECRET}
      - GATEWAY_URL=${GATEWAY_URL:-http://gateway}
      - ENV=${ENV:-production}
    networks:
      - backend
      - shared-auth-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/hdfc-as03/naba-frontend:${IMAGE_TAG:-latest}
    container_name: naba-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE=http://44.196.204.173:8000
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge
  shared-auth-network:
    name: shared-auth-network
    driver: bridge